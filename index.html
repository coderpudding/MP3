<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Music Player" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://kit.fontawesome.com/585143586a.js"
      crossorigin="anonymous"
    ></script>
    <script defer src="./script.js"></script>
    <title>Music Player</title>
  </head>
  <body>
    <section id="ALLInBODY">
      <div id="contentWrapper">
        <div id="WholeCardContainer">
          <div id="MusicDesc">
            <h2 id="SongName"></h2>
            <p id="ArtistName"></p>
          </div>
          <div id="MusicImg">
            <img draggable="false" id="SongImg" src="" alt="SongImage" />
          </div>
          <audio></audio>

          <div id="Progress_element">
            <div id="Progressduration">
              <div id="start">0 : 00</div>
              <div id="end">4 : 00</div>
            </div>
            <div id="Progressbar">
              <div id="Progress"></div>
            </div>
          </div>
          <div id="Control">
            <i id="prev" class="fa-solid fa-backward-step"></i>
            <i id="play" class="fa-solid fa-play"></i>
            <i id="next" class="fa-solid fa-forward-step"></i>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
